<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Letter E - bold, white -->
  <rect x="120" y="130" width="60" height="252" rx="12" fill="white"/>
  <rect x="120" y="130" width="200" height="60" rx="12" fill="white"/>
  <rect x="120" y="226" width="165" height="56" rx="12" fill="white"/>
  <rect x="120" y="322" width="210" height="60" rx="12" fill="white"/>

  <!-- Sparkle star top-right -->
  <g transform="translate(360,148) scale(0.9)">
    <polygon points="0,-32 7,-7 32,0 7,7 0,32 -7,7 -32,0 -7,-7"
      fill="white" opacity="0.95"/>
  </g>

  <!-- Small dot accent -->
  <circle cx="370" cy="310" r="14" fill="white" opacity="0.6"/>
  <circle cx="408" cy="348" r="9" fill="white" opacity="0.4"/>
</svg>
